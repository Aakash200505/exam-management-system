{% extends 'base.html' %}

{% block title %}Create New Exam - ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card" style="max-width: 600px; width: 100%;">
        <div class="mb-5 d-flex align-items-center">
            <a href="{{ url_for('exam.index') }}" class="btn btn-sm btn-outline-dark rounded-circle me-3"
                style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h3 class="fw-bold mb-0">Create New Exam</h3>
                <p class="text-muted small mb-0">Set up your assessment parameters.</p>
            </div>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="title" class="form-label small fw-bold text-uppercase">Exam Title</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-file-signature text-primary"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="title" name="title"
                        placeholder="e.g. Midterm Examination" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="course_id" class="form-label small fw-bold text-uppercase">Target Course</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-graduation-cap text-primary"></i></span>
                    <select class="form-select form-control-custom border-start-0" id="course_id" name="course_id"
                        required>
                        <option value="" disabled selected>Select a course...</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-5">
                <label for="duration" class="form-label small fw-bold text-uppercase">Duration (Minutes)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-clock text-primary"></i></span>
                    <input type="number" class="form-control form-control-custom border-start-0" id="duration"
                        name="duration" value="60" min="1" required>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-premium py-3">
                    Continue to Add Questions <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
