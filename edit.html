{% extends 'base.html' %}

{% block title %}Edit Profile - ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card" style="max-width: 600px; width: 100%;">
        <div class="mb-5 d-flex align-items-center">
            <a href="{{ url_for('profile.index') }}" class="btn btn-sm btn-outline-dark rounded-circle me-3"
                style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h3 class="fw-bold mb-0">Edit Profile</h3>
                <p class="text-muted small mb-0">Keep your information up to date.</p>
            </div>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="email" class="form-label small fw-bold text-uppercase">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-envelope text-primary"></i></span>
                    <input type="email" class="form-control form-control-custom border-start-0" id="email" name="email"
                        value="{{ user.email }}" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="avatar_url" class="form-label small fw-bold text-uppercase">Avatar URL</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-image text-primary"></i></span>
                    <input type="url" class="form-control form-control-custom border-start-0" id="avatar_url"
                        name="avatar_url" value="{{ user.avatar_url or '' }}"
                        placeholder="https://example.com/avatar.jpg">
                </div>
                <small class="text-muted mt-1 d-block">Link to a custom profile picture.</small>
            </div>

            <div class="mb-5">
                <label for="bio" class="form-label small fw-bold text-uppercase">Bio</label>
                <textarea class="form-control form-control-custom" id="bio" name="bio" rows="4"
                    placeholder="Tell us a bit about yourself...">{{ user.bio or '' }}</textarea>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-premium flex-grow-1 py-3">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
                <a href="{{ url_for('profile.index') }}"
                    class="btn btn-outline-dark px-4 py-3 rounded-pill text-decoration-none">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
