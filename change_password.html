{% extends 'base.html' %}

{% block title %}Change Password - ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card" style="max-width: 500px; width: 100%;">
        <div class="mb-5 d-flex align-items-center">
            <a href="{{ url_for('profile.index') }}" class="btn btn-sm btn-outline-dark rounded-circle me-3"
                style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h3 class="fw-bold mb-0">Update Security</h3>
                <p class="text-muted small mb-0">Secure your account with a strong password.</p>
            </div>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="current_password" class="form-label small fw-bold text-uppercase">Current Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-shield-alt text-primary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="current_password"
                        name="current_password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="new_password" class="form-label small fw-bold text-uppercase">New Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-lock text-primary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="new_password"
                        name="new_password" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <div class="mb-5">
                <label for="confirm_password" class="form-label small fw-bold text-uppercase">Confirm New
                    Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-check-double text-primary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="confirm_password"
                        name="confirm_password" placeholder="Repeat new password" required>
                </div>
            </div>

            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-premium py-3">
                    <i class="fas fa-sync-alt me-2"></i>Update Password
                </button>
                <a href="{{ url_for('profile.index') }}"
                    class="btn btn-outline-dark py-3 rounded-pill text-decoration-none text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
